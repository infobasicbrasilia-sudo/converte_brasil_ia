<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasil IA - Conversor MP4 para MP3</title>
    
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .logo-brasil {
            width: 80px;
            margin-bottom: 1rem;
        }
        h1 { color: #003399; margin: 0; font-size: 1.8rem; }
        p { color: #666; margin-bottom: 1.5rem; }
        
        .drop-zone {
            border: 2px dashed #003399;
            padding: 2rem;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: 0.3s;
            background: #f8f9fa;
        }
        .drop-zone:hover { background: #eef2ff; border-color: #00cc00; }
        #fileInput { display: none; }
        
        .btn-convert {
            background: #003399;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn-convert:hover { background: #002673; }
        .btn-convert:disabled { background: #ccc; cursor: not-allowed; }
        
        .status-msg {
            margin-top: 1rem;
            font-weight: bold;
            display: none;
            padding: 10px;
            border-radius: 5px;
        }
        #downloadArea {
            margin-top: 1.5rem;
            display: none;
            padding: 1rem;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
        }
        .download-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="BSBiA.png" alt="BSBiA Logo" class="logo-brasil">
    <h1>Brasil IA</h1>
    <p>Conversor de Vídeo para Áudio (MP3)</p>

    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <span id="fileName">Clique para selecionar um vídeo MP4</span>
        <input type="file" id="fileInput" accept="video/mp4">
    </div>

    <button id="convertBtn" class="btn-convert" disabled>INICIAR CONVERSÃO</button>
    <div id="status" class="status-msg"></div>

    <div id="downloadArea">
        <p style="color: #155724; margin: 0;">✅ Conversão concluída!</p>
        <a id="mp3Link" href="#" class="download-link" target="_blank">BAIXAR MP3</a>
    </div>

    <div class="footer">Devs: Alunos de Informática Básica do Instrutor Joner 2026</div>
</div>

<div align="center" style="margin-top:20px;">
    <a href='https://www.counter12.com'><img src='https://www.counter12.com/img-8xW6aD0D8x90Z669-3.gif' border='0'></a>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const downloadArea = document.getElementById('downloadArea');
    const mp3Link = document.getElementById('mp3Link');

    fileInput.addEventListener('change', function() {
        if (this.files[0]) {
            const sizeMB = (this.files[0].size / (1024 * 1024)).toFixed(2);
            fileName.innerText = `Arquivo: ${this.files[0].name} (${sizeMB}MB)`;
            convertBtn.disabled = false;
            status.style.display = 'none';
            downloadArea.style.display = 'none';
        }
    });

    convertBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return;

        convertBtn.disabled = true;
        status.style.display = 'block';
        status.style.color = '#003399';
        status.style.backgroundColor = '#eef2ff';
        status.innerText = "🚀 Enviando para o Brasil IA... (Aguarde)";

        try {
            const toBase64 = file => new Promise((r, j) => {
    const reader = new FileReader();
    // Isso lê o arquivo e transforma em uma string pura
    reader.readAsDataURL(file);
    reader.onload = () => r(reader.result.split(',')[1]); // Pega só o código, remove o "data:video..."
    reader.onerror = j;
});

            const data = await response.json();

            if (!response.ok) {
                // Se for erro 413 do Vercel ou erro da API
                throw new Error(data.error || "O servidor não suportou o tamanho do arquivo.");
            }

            checkStatus(data.data.id);
        } catch (e) {
            status.style.color = '#721c24';
            status.style.backgroundColor = '#f8d7da';
            status.innerText = "❌ " + e.message;
            convertBtn.disabled = false;
        }
    });

    async function checkStatus(id) {
        status.innerText = "⏳ IA Processando o áudio... Quase lá!";
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`https://api.convertio.co/convert/${id}/status`);
                const s = await res.json();
                if (s.data.step === 'finish') {
                    clearInterval(interval);
                    status.style.display = 'none';
                    downloadArea.style.display = 'block';
                    mp3Link.href = s.data.output.url;
                    convertBtn.disabled = false;
                } else if (s.data.step === 'error') {
                    clearInterval(interval);
                    throw new Error("Erro na conversão da Convertio.");
                }
            } catch (e) {
                clearInterval(interval);
                status.innerText = "❌ Erro ao processar.";
                convertBtn.disabled = false;
            }
        }, 4000);
    }

    const toBase64 = file => new Promise((r, j) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => r(reader.result.split(',')[1]);
        reader.onerror = j;
    });
</script>
</body>
</html>
