<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasil IA - Conversor MP4 para MP3</title>
    <link rel="stylesheet" href="css/style.css?v=4.0">
</head>
<body>

<div class="card">
    <img src="BSBiA.png" alt="BSBiA Logo" class="logo-brasil">
    <h1>Brasil IA</h1>
    <p>Conversor de Vídeo para Áudio (MP3)</p>

    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <span id="fileName">Selecione um vídeo MP4 (Máx 4.5MB)</span>
        <input type="file" id="fileInput" accept="video/mp4">
    </div>

    <button id="convertBtn" class="btn-convert" disabled>INICIAR CONVERSÃO</button>
    <div id="status" class="status-msg"></div>

    <div id="downloadArea" style="display: none;">
        <p style="color: #155724;">✅ Conversão concluída!</p>
        <a id="mp3Link" href="#" class="download-link" target="_blank">BAIXAR MP3</a>
    </div>

    <div class="footer">Devs: Alunos de Informática Básica do Instrutor Joner 2026</div>
</div>

<div align="center" style="margin-top:20px;">
    <a href='https://www.counter12.com'><img src='https://www.counter12.com/img-8xW6aD0D8x90Z669-3.gif' border='0'></a>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const downloadArea = document.getElementById('downloadArea');
    const mp3Link = document.getElementById('mp3Link');

    fileInput.addEventListener('change', function() {
        if (this.files[0]) {
            const sizeMB = (this.files[0].size / (1024 * 1024)).toFixed(2);
            fileName.innerText = `Arquivo: ${this.files[0].name} (${sizeMB}MB)`;
            convertBtn.disabled = false;
            status.style.display = 'none';
            downloadArea.style.display = 'none';
        }
    });

    convertBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return;

        const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2);

        // Validação de segurança para o plano Free do Vercel (4.5MB real)
        if (file.size > 4.5 * 1024 * 1024) {
            status.style.display = 'block';
            status.innerHTML = `❌ Arquivo muito grande (${fileSizeMB}MB).<br>O limite gratuito é 4.5MB (Vídeos curtos).`;
            status.style.color = "#721c24";
            return;
        }

        convertBtn.disabled = true;
        status.style.display = 'block';
        status.style.color = "#333";
        status.innerText = `🚀 Enviando ${fileSizeMB}MB para o Brasil IA...`;

        try {
            const base64 = await toBase64(file);
            const response = await fetch('/api/convert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file: base64, filename: file.name })
            });

            if (!response.ok) throw new Error("Erro no servidor. Tente um vídeo mais curto.");

            const data = await response.json();
            if (data.status !== 'ok') throw new Error(data.error || "Erro na conversão");

            checkStatus(data.data.id);
        } catch (e) {
            status.innerText = "❌ " + e.message;
            convertBtn.disabled = false;
        }
    });

    async function checkStatus(id) {
        status.innerText = "⏳ IA Processando... Isso pode levar 1 ou 2 minutos.";
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`https://api.convertio.co/convert/${id}/status`);
                const s = await res.json();
                if (s.data.step === 'finish') {
                    clearInterval(interval);
                    status.style.display = 'none';
                    downloadArea.style.display = 'block';
                    mp3Link.href = s.data.output.url;
                    convertBtn.disabled = false;
                }
            } catch (e) { }
        }, 4000);
    }

    const toBase64 = file => new Promise((r, j) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => r(reader.result.split(',')[1]);
        reader.onerror = j;
    });
</script>
</body>
</html>
