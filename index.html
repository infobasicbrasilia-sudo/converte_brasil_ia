<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasil IA - Conversor MP4 para MP3</title>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        .logo-brasil { width: 80px; margin-bottom: 1rem; }
        h1 { color: #003399; margin: 0; }
        .drop-zone { border: 2px dashed #003399; padding: 2rem; border-radius: 10px; cursor: pointer; margin: 1.5rem 0; background: #f8f9fa; }
        #fileInput { display: none; }
        .btn-convert { background: #003399; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-convert:disabled { background: #ccc; }
        .status-msg { margin-top: 1rem; font-weight: bold; display: none; padding: 10px; border-radius: 5px; }
        #downloadArea { margin-top: 1.5rem; display: none; padding: 1rem; background: #d4edda; border-radius: 8px; }
        .download-link { display: inline-block; padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .counter-container { margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <img src="BSBiA.png" alt="Logo" class="logo-brasil">
    <h1>Brasil IA</h1>
    <p>Conversor MP4 para MP3</p>

    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <span id="fileName">Clique para selecionar o vídeo</span>
        <input type="file" id="fileInput" accept="video/mp4">
    </div>

    <button id="convertBtn" class="disabled btn-convert" disabled>INICIAR CONVERSÃO</button>
    <div id="status" class="status-msg"></div>

    <div id="downloadArea">
        <p>✅ Conversão concluída!</p>
        <a id="mp3Link" href="#" class="download-link" target="_blank">BAIXAR MP3</a>
    </div>
    
    <div style="margin-top: 20px; font-size: 0.8rem; color: #999;">
        Devs: Alunos de Informática Básica - Joner 2026
    </div>
</div>

<div class="counter-container">
    <a href='https://www.counter12.com'>
        <img src='https://www.counter12.com/img-8xW6aD0D8x90Z669-3.gif' border='0' alt='contador de visitas'>
    </a>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const downloadArea = document.getElementById('downloadArea');
    const mp3Link = document.getElementById('mp3Link');

    fileInput.onchange = function() {
        if (this.files[0]) {
            fileName.innerText = "Arquivo: " + this.files[0].name;
            convertBtn.disabled = false;
        }
    };

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
    });

    async function checkStatus(id) {
        status.innerText = "⏳ IA Processando... Aguarde.";
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`https://api.convertio.co/convert/${id}/status`);
                const s = await res.json();
                if (s.data.step === 'finish') {
                    clearInterval(interval);
                    status.style.display = 'none';
                    downloadArea.style.display = 'block';
                    mp3Link.href = s.data.output.url;
                    convertBtn.disabled = false;
                }
            } catch (e) { console.error(e); }
        }, 4000);
    }

    convertBtn.onclick = async function() {
        const file = fileInput.files[0];
        if (!file) return;

        convertBtn.disabled = true;
        status.style.display = 'block';
        status.style.backgroundColor = "transparent";
        status.style.color = "#003399";
        status.innerText = "🚀 Enviando...";

        try {
            const base64 = await toBase64(file);
            const res = await fetch('/api/convert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file: base64, filename: file.name })
            });

            // Proteção contra o erro "Token R" (Texto em vez de JSON)
            if (res.status === 413) throw new Error("Vídeo muito grande (Máx 4.5MB)");
            
            const contentType = res.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                throw new Error("O servidor respondeu de forma inválida.");
            }

            const data = await res.json();
            if (data.status === 'ok') {
                checkStatus(data.data.id);
            } else {
                throw new Error(data.error || "Erro na conversão");
            }
        } catch (e) {
            status.style.backgroundColor = "#f8d7da";
            status.style.color = "#721c24";
            status.innerText = "❌ " + e.message;
            convertBtn.disabled = false;
        }
    };
</script>
</body>
</html>
