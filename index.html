<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasil IA - Conversor MP4 para MP3</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); width: 95%; max-width: 500px; text-align: center; border-top: 6px solid #0056b3; }
        .logo-brasil { width: 150px; margin-bottom: 20px; }
        h1 { color: #0056b3; margin: 5px 0; font-size: 24px; }
        .drop-zone { border: 2px dashed #0056b3; padding: 40px 20px; border-radius: 12px; background: #f8fbff; cursor: pointer; margin-top: 20px; }
        #fileInput { display: none; }
        .status-msg { margin-top: 25px; font-weight: bold; color: #0056b3; display: none; padding: 15px; background: #e7f0ff; border-radius: 8px; border-left: 5px solid #0056b3; word-break: break-all; }
        .btn-convert { display: block; width: 100%; padding: 18px; margin-top: 25px; background: #0056b3; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .btn-convert:disabled { background: #bcc6d1; cursor: not-allowed; }
        #downloadArea { margin-top: 25px; display: none; padding: 20px; background-color: #d4edda; border-radius: 12px; }
        .download-link { text-decoration: none; font-weight: bold; display: inline-block; margin-top: 12px; background: #28a745; color: white; padding: 12px 25px; border-radius: 6px; }
        .footer { font-size: 11px; color: #888; margin-top: 30px; }
    </style>
</head>
<body>

<div class="card">
    <img src="BSBiA.png" alt="BSBiA Logo" class="logo-brasil">
    <h1>Brasil IA</h1>
    <p>Conversor de Vídeo para Áudio (MP3)</p>

    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <span id="fileName">Selecione um vídeo MP4</span>
        <input type="file" id="fileInput" accept="video/mp4">
    </div>

    <button id="convertBtn" class="btn-convert" disabled>INICIAR CONVERSÃO</button>
    <div id="status" class="status-msg"></div>

    <div id="downloadArea">
        <p style="color: #155724;">✅ Conversão concluída!</p>
        <a id="mp3Link" href="#" class="download-link" target="_blank">BAIXAR MP3</a>
    </div>

    <div class="footer">Devs: Alunos de Informática Básica do Instrutor Joner 2026</div>
</div>

<div align="center" style="margin-top:20px;">
    <a href='https://www.counter12.com'><img src='https://www.counter12.com/img-8xW6aD0D8x90Z669-3.gif' border='0'></a>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const downloadArea = document.getElementById('downloadArea');
    const mp3Link = document.getElementById('mp3Link');

    fileInput.addEventListener('change', function() {
        if (this.files[0]) {
            fileName.innerText = "Arquivo: " + this.files[0].name;
            convertBtn.disabled = false;
            status.style.display = 'none';
            downloadArea.style.display = 'none';
        }
    });

    convertBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return;

        convertBtn.disabled = true;
        status.style.display = 'block';
        status.innerText = "🚀 Enviando... (Arquivos grandes demoram mais)";

        try {
            const base64 = await toBase64(file);
            const response = await fetch('/api/convert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file: base64, filename: file.name })
            });

            // Se o Vercel der erro 504 ou 500 (O tal erro do "R")
            if (!response.ok) {
                const text = await response.text();
                if (text.includes("Payload Too Large")) throw new Error("Vídeo muito grande para o plano gratuito.");
                throw new Error("O servidor demorou muito ou falhou.");
            }

            const data = await response.json();
            if (data.status !== 'ok') throw new Error(data.error || "Erro na conversão");

            checkStatus(data.data.id);
        } catch (e) {
            status.innerText = "❌ " + e.message;
            convertBtn.disabled = false;
        }
    });

    async function checkStatus(id) {
        status.innerText = "⏳ IA Processando... Não feche a página.";
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`https://api.convertio.co/convert/${id}/status`);
                const s = await res.json();
                if (s.data.step === 'finish') {
                    clearInterval(interval);
                    status.style.display = 'none';
                    downloadArea.style.display = 'block';
                    mp3Link.href = s.data.output.url;
                    convertBtn.disabled = false;
                }
            } catch (e) { /* continua tentando */ }
        }, 4000);
    }

    const toBase64 = file => new Promise((r, j) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => r(reader.result.split(',')[1]);
        reader.onerror = j;
    });
</script>
</body>
</html>
